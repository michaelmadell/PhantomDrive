name: .NET

on:
  push:
    branches: [ "Workflow-Test" ]
  pull_request:
    branches: [ "Workflow-Test" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore -p:EnableWindowsTargeting=true

    - name: Build
      run: dotnet build --no-restore -c Release -p:EnableWindowsTargeting=true

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal -p:EnableWindowsTargeting=true --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

    - name: Upload test results (TRX)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults/**/*.trx

    - name: Publish (WPF self-contained single-file)
      run: >
        dotnet publish ./VirtualDriveManager.csproj
        -c Release
        -r win-x64
        --self-contained true
        -p:PublishSingleFile=true
        -p:EnableWindowsTargeting=true
        -o publish

    - name: Upload published app
      uses: actions/upload-artifact@v4
      with:
        name: wpf-win-x64-selfcontained-singlefile
        path: publish/**
